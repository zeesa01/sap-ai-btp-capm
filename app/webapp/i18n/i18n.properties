# =============================================================================
# i18n.properties — Internationalisation (i18n) text file
#
# WHAT IS i18n?
# "i18n" stands for Internationalization (18 letters between i and n).
# Instead of hardcoding text like "Save" directly in XML views,
# you store all text here as key=value pairs.
#
# WHY?
#   1. Translation: create i18n_de.properties for German, i18n_fr.properties for French
#      UI5 automatically picks the right file based on browser language.
#   2. Single source of truth: change a label in one place, it updates everywhere.
#   3. Consistency: the same label key gives the same text across all views.
#
# HOW TO USE IN XML VIEW:
#   text="{i18n>appTitle}"   → reads the value of key "appTitle" from this file
#
# HOW TO USE IN CONTROLLER:
#   this.getResourceBundle().getText("appTitle")
# =============================================================================

